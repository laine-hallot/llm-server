services:
  llamacpp-mellum:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    ports:
      - 8081:8080
    volumes:
      - /home/laineh/models:/models
    command: --model /models/Mellum-4b-sft-all-gguf/mellum-4b-sft-all.Q8_0.gguf
            --alias mellum
            --host 0.0.0.0
            --port 8080
            --no-webui
            --ctx-size 0
            --temp 0.2
            --top-k 40
            --top-p 0.9
            --repeat-penalty 1.2
            --repeat-last-n 128
            --predict 512
            --offline
    networks:
      - lalamos-net

